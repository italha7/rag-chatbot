<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Chatbot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0f0f0;--text2:#999;--text3:#555;--purple:#7c6af7;--radius:12px;--radius-sm:8px}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
    header{padding:12px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg2);flex-shrink:0}
    .logo{width:32px;height:32px;background:var(--purple);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:white;font-size:16px}
    header h1{font-size:15px;font-weight:500}
    header p{font-size:12px;color:var(--text2);margin-top:1px}
    #setup-bar{background:#1a1500;border-bottom:0.5px solid #3a2e00;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
    #setup-bar label{font-size:12px;color:#f0c040;white-space:nowrap}
    #api-key-input{flex:1;min-width:200px;background:#111;border:0.5px solid #3a2e00;border-radius:6px;padding:7px 10px;color:#f0f0f0;font-size:12px;font-family:monospace;outline:none}
    #api-key-input:focus{border-color:#f0c040}
    #save-key-btn{padding:7px 16px;background:#f0c040;color:#000;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
    #save-key-btn:hover{background:#ffd700}
    #key-status{font-size:12px;white-space:nowrap}
    #app{display:flex;flex:1;overflow:hidden}
    #sidebar{width:280px;border-right:0.5px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0}
    .sidebar-label{padding:12px 14px 8px;border-bottom:0.5px solid var(--border);font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
    #doc-textarea{flex:1;resize:none;background:transparent;border:none;color:var(--text);font-size:13px;line-height:1.7;font-family:inherit;outline:none;padding:12px 14px;min-height:0}
    #doc-textarea::placeholder{color:var(--text3)}
    .doc-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
    #embed-btn{margin:10px 12px;padding:9px;background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s;flex-shrink:0}
    #embed-btn:hover{opacity:.85}
    #embed-btn:disabled{opacity:.35;cursor:not-allowed}
    #status-bar{padding:8px 14px 10px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:7px;flex-shrink:0}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
    .dot.ready{background:#5aa832}
    .dot.loading{background:#e8a020;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    #chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
    #messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);text-align:center;gap:8px;padding:40px}
    .empty-state i{font-size:36px;color:var(--border2)}
    .empty-state h3{font-size:14px;font-weight:500;color:var(--text2)}
    .empty-state p{font-size:13px;line-height:1.7}
    .msg{display:flex;flex-direction:column;gap:3px;max-width:82%}
    .msg.user{align-self:flex-end;align-items:flex-end}
    .msg.bot{align-self:flex-start;align-items:flex-start}
    .msg-label{font-size:11px;color:var(--text3);padding:0 4px}
    .msg-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
    .msg.user .msg-bubble{background:var(--purple);color:white;border-bottom-right-radius:4px}
    .msg.bot .msg-bubble{background:var(--bg3);color:var(--text);border:0.5px solid var(--border2);border-bottom-left-radius:4px}
    .sources-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;margin-top:4px;max-width:100%}
    .sources-box strong{color:var(--text2);font-weight:500;display:flex;align-items:center;gap:5px;margin-bottom:5px}
    .source-chunk{color:var(--text3);font-style:italic;line-height:1.6;padding:4px 0;border-top:0.5px solid var(--border);font-size:11px}
    .thinking-bubble{background:var(--bg3);border:0.5px solid var(--border2);border-radius:14px;border-bottom-left-radius:4px;padding:12px 16px;display:flex;gap:5px;align-items:center}
    .thinking-bubble span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:bounce 1.2s infinite}
    .thinking-bubble span:nth-child(2){animation-delay:.2s}
    .thinking-bubble span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
    #input-area{padding:12px 16px;border-top:0.5px solid var(--border);display:flex;gap:8px;align-items:flex-end;background:var(--bg2);flex-shrink:0}
    #user-input{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;line-height:1.5;max-height:120px;transition:border-color .15s}
    #user-input:focus{border-color:var(--purple)}
    #user-input::placeholder{color:var(--text3)}
    #send-btn{padding:10px 16px;background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;flex-shrink:0;transition:opacity .15s;height:40px}
    #send-btn:hover{opacity:.85}
    #send-btn:disabled{opacity:.3;cursor:not-allowed}
    @media(max-width:640px){#sidebar{width:100%;height:250px;border-right:none;border-bottom:0.5px solid var(--border)}#app{flex-direction:column}.msg{max-width:92%}}
  </style>
</head>
<body>
<header>
  <div class="logo"><i class="ti ti-message-chatbot"></i></div>
  <div><h1>RAG Chatbot</h1><p>Paste your document, ask anything</p></div>
</header>

<div id="setup-bar">
  <label><i class="ti ti-key" style="margin-right:4px"></i>Groq API Key:</label>
  <input type="text" id="api-key-input" placeholder="Paste your Groq key here: gsk_..." autocomplete="off" />
  <button id="save-key-btn" onclick="saveKey()">Save Key</button>
  <span id="key-status"></span>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-label"><i class="ti ti-file-text" style="margin-right:4px"></i>Knowledge Base</div>
    <div class="doc-wrap">
      <textarea id="doc-textarea" placeholder="Paste your document or text here...

For example:
- Any article or blog post
- Product description
- Company FAQ
- Study notes
- Any knowledge base content

Then click Load Document!"></textarea>
    </div>
    <button id="embed-btn" onclick="loadDocument()">
      <i class="ti ti-upload"></i> Load Document
    </button>
    <div id="status-bar">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">No document loaded</span>
    </div>
  </div>

  <div id="chat-panel">
    <div id="messages">
      <div class="empty-state" id="empty-state">
        <i class="ti ti-robot"></i>
        <h3>RAG Chatbot Ready</h3>
        <p>1. Paste your API key above and click Save<br>2. Paste your document on the left<br>3. Click Load Document<br>4. Start asking questions!</p>
      </div>
    </div>
    <div id="input-area">
      <textarea id="user-input" rows="1" placeholder="Ask a question... (Enter = send, Shift+Enter = new line)" onkeydown="handleKey(event)" oninput="autoResize(this)" disabled></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled><i class="ti ti-send"></i></button>
    </div>
  </div>
</div>

<script>
let chunks=[], isReady=false, isThinking=false, GROQ_KEY='';

function setKeyStatus(ok, msg){
  const el = document.getElementById('key-status');
  el.textContent = msg;
  el.style.color = ok ? '#5aa832' : '#e05050';
}

function saveKey(){
  const inp = document.getElementById('api-key-input');
  const k = inp.value.trim();
  if(!k){ setKeyStatus(false, 'Please paste your API key first'); return; }
  if(!k.startsWith('gsk_')){ setKeyStatus(false, 'Invalid key - Groq keys start with gsk_'); return; }
  GROQ_KEY = k;
  let stored = false;
  try{
    localStorage.setItem('rag_api_key', k);
    stored = (localStorage.getItem('rag_api_key') === k);
  } catch(e){ stored = false; }
  if(stored){
    setKeyStatus(true, '✓ Key saved and ready!');
  } else {
    setKeyStatus(true, '✓ Key set for this session (browser blocked storage)');
  }
}

window.onload = function(){
  try{
    const saved = localStorage.getItem('rag_api_key');
    if(saved && saved.startsWith('gsk_')){
      GROQ_KEY = saved;
      document.getElementById('api-key-input').value = saved;
      setKeyStatus(true, '✓ Key loaded!');
    }
  } catch(e){}
};

function splitIntoChunks(text, size, overlap){
  size = size||300; overlap = overlap||60;
  var words = text.split(/\s+/).filter(function(w){return w.length>0;});
  if(words.length <= size){
    var whole = words.join(' ');
    return whole.trim().length > 0 ? [whole] : [];
  }
  var result = []; var i = 0;
  while(i < words.length){
    var chunk = words.slice(i, i+size).join(' ');
    if(chunk.trim().length > 0) result.push(chunk);
    i += size - overlap;
  }
  return result;
}

function simpleEmbed(text){
  var words = text.toLowerCase().replace(/[^\w\s]/g,' ').split(/\s+/);
  var vocab = {};
  for(var i=0;i<words.length;i++){ var w=words[i]; if(w.length>1) vocab[w]=(vocab[w]||0)+1; }
  return vocab;
}

function sparseScore(qv,cv){ var s=0; for(var w in qv){ if(cv[w]) s+=qv[w]*cv[w]; } return s; }

function retrieve(query,k){
  k=k||3;
  var qv=simpleEmbed(query);
  var scored=chunks.map(function(c){return{text:c.text,score:sparseScore(qv,c.vocab)};});
  scored.sort(function(a,b){return b.score-a.score;});
  return scored.slice(0,k).filter(function(c){return c.score>0;});
}

function loadDocument(){
  var text=document.getElementById('doc-textarea').value.trim();
  if(!text){alert('Please paste some text first!');return;}
  var btn=document.getElementById('embed-btn'),dot=document.getElementById('status-dot'),st=document.getElementById('status-text');
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader"></i> Processing...';
  dot.className='dot loading'; st.textContent='Processing document...';
  setTimeout(function(){
    chunks=splitIntoChunks(text).map(function(c){return{text:c,vocab:simpleEmbed(c)};});
    isReady=true;
    btn.disabled=false; btn.innerHTML='<i class="ti ti-refresh"></i> Reload Document';
    dot.className='dot ready'; st.textContent=chunks.length+' chunks ready ✓';
    document.getElementById('user-input').disabled=false;
    document.getElementById('send-btn').disabled=false;
    var e=document.getElementById('empty-state'); if(e)e.remove();
    addBotMessage('✅ Document loaded! Split into '+chunks.length+' chunks. Ask your questions!',[]);
  },500);
}

function addBotMessage(text,sources){
  var msgs=document.getElementById('messages');
  var div=document.createElement('div'); div.className='msg bot';
  var label=document.createElement('div'); label.className='msg-label'; label.textContent='AI';
  var bubble=document.createElement('div'); bubble.className='msg-bubble'; bubble.textContent=text;
  div.appendChild(label); div.appendChild(bubble);
  if(sources&&sources.length>0){
    var box=document.createElement('div'); box.className='sources-box';
    box.innerHTML='<strong><i class="ti ti-search" style="font-size:12px"></i> Retrieved context ('+sources.length+' chunks)</strong>';
    sources.forEach(function(s){var c=document.createElement('div');c.className='source-chunk';c.textContent='"'+s.text.slice(0,130)+(s.text.length>130?'...':'')+'"';box.appendChild(c);});
    div.appendChild(box);
  }
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

function addUserMessage(text){
  var msgs=document.getElementById('messages');
  var div=document.createElement('div'); div.className='msg user';
  div.innerHTML='<div class="msg-label">You</div><div class="msg-bubble">'+text.replace(/</g,'&lt;').replace(/\n/g,'<br>')+'</div>';
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

function showThinking(){
  var msgs=document.getElementById('messages');
  var div=document.createElement('div'); div.className='msg bot'; div.id='thinking-msg';
  div.innerHTML='<div class="msg-label">AI</div><div class="thinking-bubble"><span></span><span></span><span></span></div>';
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

function removeThinking(){ var t=document.getElementById('thinking-msg'); if(t)t.remove(); }

async function sendMessage(){
  if(!GROQ_KEY){ alert('Please save your API key first!'); return; }
  if(!isReady){ alert('Please load a document first!'); return; }
  if(isThinking) return;
  var input=document.getElementById('user-input');
  var query=input.value.trim(); if(!query) return;
  input.value=''; input.style.height='auto';
  isThinking=true; document.getElementById('send-btn').disabled=true;
  addUserMessage(query); showThinking();
  var retrieved=retrieve(query,3);
  var context=retrieved.length>0?retrieved.map(function(r,i){return'['+(i+1)+'] '+r.text;}).join('\n\n'):'No relevant content found in the document.';
  var systemPrompt='You are a helpful RAG assistant. Use only the retrieved document chunks below to answer the question. If the answer is not in the context, clearly say so.\n\nRETRIEVED CONTEXT:\n'+context;
  try{
    var res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:1000,
        messages:[
          {role:'system',content:systemPrompt},
          {role:'user',content:query}
        ]
      })
    });
    var data=await res.json();
    var answer;
    if(data.choices && data.choices[0] && data.choices[0].message){
      answer=data.choices[0].message.content;
    } else {
      answer='Error: '+(data.error?data.error.message:'Unknown error');
    }
    removeThinking(); addBotMessage(answer,retrieved);
  } catch(e){ removeThinking(); addBotMessage('Network error: '+e.message,[]); }
  isThinking=false; document.getElementById('send-btn').disabled=false;
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
</script>
</body>
</html>
